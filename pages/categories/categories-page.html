<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories Page</title>
  <link rel="stylesheet" href="category.css">
</head>
<body>
  <a href="../../index.html">Back to main</a>

  <h2>Categories Table</h2>
  <table style="width: 100%; border: 1px solid black; border-collapse: collapse;">
    <thead>
      <th style="border: 1px solid black; padding: 5px;">Id</th>
      <th style="border: 1px solid black; padding: 5px;">Name</th>
      <th style="border: 1px solid black; padding: 5px;">Description</th>
      <th style="border: 1px solid black; padding: 5px;">Type</th>
      <th style="border: 1px solid black; padding: 5px;">Actions</th>
    </thead>
    <tbody id="categoryTableBody"></tbody>
  </table>

  <button id="createCategoryFormDialogOpenButton">Create Category</button>

  <dialog id="createCategoryFormDialog" closedby="any">
    <div id="createCategoryFormHeader" style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
      <h3>New Category Form</h3>

      <button>Close Dialog</button>
    </div>
  </dialog>

  <template id="categoryRowTemplate">
    <tr>
      <td style="border: 1px solid black; padding: 5px; font-weight: 600;"></td>
      <td style="border: 1px solid black; padding: 5px;"></td>
      <td style="border: 1px solid black; padding: 5px;"></td>
      <td style="border: 1px solid black; padding: 5px;"></td>
      <td style="border: 1px solid black; padding: 5px;"></td>
    </tr>
  </template>

  <template id="createCategoryFormTemplate">
    <form style="display: flex; flex-direction: column; gap: 20px;">
      <input id="categoryName" name="categoryName" type="text" />
      <textarea id="categoryDescription" name="categoryDescription" type="text"></textarea>

      <fieldset id="categoryTypeFieldset">
        <legend>Select category type</legend>
      </fieldset>

      <button type="submit">Create Category</button>
    </form>
  </template>

  <script type="module" src="categories.js"></script>
</body>
</html>
